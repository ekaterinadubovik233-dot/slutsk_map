<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Слуцк: Культурное наследие</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css" />
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
    <div class="header-content">
        <div class="header-left">
            <div class="logo-medallion-c"><span>С</span></div>
            <div class="title-group">
                <h1 class="main-title">КУЛЬТУРНОЕ НАСЛЕДИЕ</h1>
                <h2 class="sub-title">ГОРОДА СЛУЦКА</h2>
            </div>
        </div>
        <div class="header-search-container">
            <input type="text" id="pcSearch" placeholder="Найти объект...">
        </div>
    </div>
</header>

<main class="app">
    <button id="toggleSidebar" class="mobile-menu-btn">☰</button>

    <aside class="route-sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3>Достопримечательности</h3>
            <button id="closeSidebar" class="mobile-close-btn">×</button>
        </div>

        <div class="sidebar-scroll">
            <ul id="route-list"></ul>
        </div>

        <div class="sidebar-controls">
            <button id="buildRoute" class="btn-main">ПОСТРОИТЬ МАРШРУТ</button>
            <button id="clearRoute" class="btn-sub">Очистить всё</button>
        </div>
    </aside>

    <section class="map-wrapper">
        <div id="map"></div>

        <div class="map-controls">
            <button id="pauseCar">⏸ Пауза</button>
            <button id="followCar">🎥 Слежение</button>
        </div>
    </section>

    <aside class="details-panel" id="detailsPanel">
        <button class="details-close" id="closeDetailsBtn">×</button>
        <h2 id="details-title"></h2>
        <div class="details-gallery" id="details-gallery"></div>

        <div class="video-inline-container">
            <video id="details-video" controls></video>
        </div>
    </aside>

    <div id="imageModal" class="image-zoom-modal">
        <span class="close-zoom" id="closeZoomBtn">&times;</span>
        <div class="nav-zone left" id="navLeft"><span>❮</span></div>
        <img id="fullImage">
        <div class="nav-zone right" id="navRight"><span>❯</span></div>
    </div>

</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.js"></script>
<script src="js/map.js"></script>

</body>
</html>
