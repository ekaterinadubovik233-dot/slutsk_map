<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Культурное наследие Слуцка</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css"/>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="header">
<div class="header-content">

<div class="header-left">
<div class="logo-medallion-c"><span>С</span></div>

<div class="title-group">
<h1 class="main-title">КУЛЬТУРНОЕ НАСЛЕДИЕ</h1>
<h2 class="sub-title">ГОРОДА СЛУЦКА</h2>
</div>
</div>

<input type="text" id="pcSearch" placeholder="Найти объект...">

</div>
</header>

<main class="app">

<aside class="route-sidebar">
<h3>Достопримечательности</h3>

<ul id="route-list"></ul>

<button id="buildRoute" class="btn-main">ПОСТРОИТЬ МАРШРУТ</button>
<button id="clearRoute" class="btn-sub">Очистить всё</button>
</aside>

<section class="map-wrapper">
<div id="map"></div>

<div class="map-controls">
<button id="pauseCar">⏸ Пауза</button>
<button id="followCar">🎥 Слежение: ВКЛ</button>
</div>
</section>

</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.js"></script>

<script src="js/map.js"></script>

</body>
</html>
