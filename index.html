<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Слуцк: Культурное наследие</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet-routing-machine/3.2.12/leaflet-routing-machine.css"/>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="header">
<div class="header-content">
<div class="header-left">
<div class="logo-medallion-c"><span>С</span></div>
<div>
<h1 class="main-title">КУЛЬТУРНОЕ НАСЛЕДИЕ</h1>
<h2 class="sub-title">ГОРОДА СЛУЦКА</h2>
</div>
</div>
<input type="text" id="pcSearch" placeholder="Поиск...">
</div>
</header>

<main class="app">

<button id="toggleSidebar" class="mobile-menu-btn">☰</button>

<aside class="route-sidebar" id="sidebar">
<div class="sidebar-header">
<h3>Объекты</h3>
<button id="closeSidebar">×</button>
</div>

<div class="sidebar-scroll">
<ul id="route-list"></ul>
</div>

<div class="sidebar-controls">
<button id="buildRoute" class="btn-main">Маршрут</button>
<button id="clearRoute" class="btn-sub">Очистить</button>
</div>
</aside>

<section class="map-wrapper">
<div id="map"></div>
</section>

<aside class="details-panel" id="detailsPanel">
<button id="closeDetailsBtn">×</button>
<h2 id="details-title"></h2>

<div id="details-gallery"></div>

<video id="details-video" controls></video>
</aside>

<div id="imageModal" class="image-zoom-modal">
<span id="closeZoomBtn">×</span>
<div id="navLeft">❮</div>
<img id="fullImage">
<div id="navRight">❯</div>
</div>

</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-routing-machine/3.2.12/leaflet-routing-machine.min.js"></script>

<script src="js/map.js"></script>

</body>
</html>
