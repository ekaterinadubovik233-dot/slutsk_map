<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Культурное наследие Слуцка</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet-routing-machine/3.2.12/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    
    <style>
        :root { --primary: #440118; --accent: #C5A059; --bg: #F9F4E8; }
        html, body { height: 100%; width: 100%; margin: 0; padding: 0; overflow: hidden; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); }

        .leaflet-routing-container { display: none !important; }

        /* ШАПКА ПК */
        .header { height: 75px; background: white; border-bottom: 3px solid var(--accent); display: flex; align-items: center; z-index: 2000; position: relative; }
        .header-content { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; }
        .header-left { display: flex; align-items: center; flex-direction: row; }

        .logo-medallion-c {
            width: 52px; height: 52px; background: var(--primary); border: 3px solid var(--accent); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; margin-right: 15px; flex-shrink: 0;
        }
        .logo-medallion-c span { color: var(--accent); font-size: 32px; font-weight: 900; font-family: 'Georgia', serif; }

        .title-group { display: flex; flex-direction: column; line-height: 1.1; }
        .main-title { font-size: 1.15rem; color: var(--primary); font-weight: 900; margin: 0; }
        .sub-title { font-size: 0.85rem; color: var(--accent); font-weight: 600; margin: 0; }
        .header-search-container input { width: 300px; padding: 10px 20px; border-radius: 20px; border: 1.5px solid var(--primary); background: #f9f9f9; outline: none; }

        .app { display: flex; height: calc(100% - 75px); position: relative; }

        /* САЙДБАР (СПИСОК) */
        .route-sidebar { width: 290px; height: 100%; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; padding: 15px 10px; z-index: 5001; }
        .sidebar-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .sidebar-header h3 { font-size: 1rem; color: var(--primary); margin: 0; text-align: center; width: 100%; }
        .sidebar-scroll { flex-grow: 1; overflow-y: auto; padding: 0 5px; }
        #route-list { list-style: none !important; padding: 0 !important; margin: 0; }
        #route-list li { padding: 5px 0; border-bottom: 1px solid #f9f9f9; display: flex; align-items: center; font-size: 13px; }
        #route-list input { margin-right: 10px; width: 16px; height: 16px; flex-shrink: 0; cursor: pointer; }

        .sidebar-controls { padding: 10px 5px; border-top: 1px solid #eee; }
        .btn-main { background: var(--primary); color: white; width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 8px; font-size: 13px; }

        /* КНОПКИ УПРАВЛЕНИЯ КАРТОЙ (Изначально скрыты) */
        .map-controls { display: none; position: absolute; bottom: 25px; left: 0; width: 100%; justify-content: center; gap: 10px; z-index: 1000; pointer-events: none; }
        .map-controls button { pointer-events: auto; background: var(--primary); color: white; border: 2px solid var(--accent); padding: 10px 20px; border-radius: 25px; font-weight: bold; font-size: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); cursor: pointer; }

        /* КАРТА */
        .map-wrapper { flex-grow: 1; height: 100%; position: relative; z-index: 1; }
        #map { width: 100%; height: 100% !important; background: var(--bg); }

        /* ПАНЕЛЬ ПОДРОБНОСТЕЙ ПК */
        .details-panel { position: fixed; right: -400px; top: 75px; width: 360px; height: calc(100% - 75px); background: white; z-index: 4000; box-shadow: -5px 0 25px rgba(0,0,0,0.1); transition: 0.4s ease; display: flex; flex-direction: column; }
        .details-panel.active { right: 0; }
        .details-header { position: relative; padding: 25px 25px 10px 25px; text-align: center; }
        .details-close { position: absolute; top: 10px; right: 10px; font-size: 35px; background: none; border: none; cursor: pointer; color: #ccc; }
        #details-title { margin: 0; color: var(--primary); font-size: 1.4rem; }

        .details-content { padding: 0 25px 25px 25px; flex-grow: 1; display: flex; flex-direction: column; overflow-y: auto; gap: 15px; }
        .details-gallery { display: flex; gap: 10px; overflow-x: auto; width: 100%; padding-bottom: 10px; }
        .details-gallery img { height: 100px; border-radius: 12px; flex-shrink: 0; box-shadow: 0 4px 8px rgba(0,0,0,0.1); cursor: pointer; }

        .video-main-container { width: 100%; display: flex; align-items: center; justify-content: center; background: transparent; border-radius: 12px; overflow: hidden; flex-shrink: 0; }
        #details-video { width: 100%; height: auto; display: block; border-radius: 12px; }

        /* МОДАЛЬНОЕ ОКНО ФОТО */
        .image-zoom-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 10000; align-items: center; justify-content: center; }
        #fullImage { max-width: 95%; max-height: 85%; border: 2px solid white; touch-action: pan-y; }
        .nav-zone { position: absolute; top: 0; height: 100%; width: 30%; display: flex; align-items: center; justify-content: center; color: white; font-size: 50px; z-index: 10; cursor: pointer; user-select: none; }
        .nav-zone.left { left: 0; } .nav-zone.right { right: 0; }
        .close-zoom { position: absolute; top: 20px; right: 30px; color: white; font-size: 50px; z-index: 20; cursor: pointer; }

        /* ПИНЫ И ИКОНКИ */
        .custom-pin { display: flex; align-items: center; justify-content: center; width: 38px; height: 38px; border-radius: 50% 50% 50% 0; border: 2px solid white; transform: rotate(-45deg); box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        .custom-pin img { width: 22px; height: 22px; transform: rotate(45deg); filter: brightness(0) invert(1); }
        .pin-chapel { background: #2c5282; } .pin-monument { background: #9b2c2c; } .pin-museum { background: #b7791f; } .pin-school { background: #276749; }
        #car-img { width: 100%; height: 100%; }

        .mobile-menu-btn, .mobile-close-btn, .drag-handle { display: none; }

        /* =====================================
           МОБИЛЬНАЯ ВЕРСИЯ
           ===================================== */
        @media (max-width: 768px) {
            .header { height: 65px; }
            .main-title { font-size: 0.95rem; } 
            .sub-title { font-size: 0.75rem; }
            .logo-medallion-c { width: 45px; height: 45px; }
            .header-search-container { display: none; }
            .app { display: block; height: calc(100% - 65px); }
            .map-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
            
            .mobile-menu-btn { display: block !important; position: absolute; top: 10px; left: 10px; z-index: 1500; background: var(--primary); color: white; border: 2px solid var(--accent); padding: 8px 16px; border-radius: 20px; font-weight: bold; font-size: 13px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
            
            .route-sidebar { position: fixed; top: 0; left: -100%; width: 85%; height: 100%; z-index: 6000; transition: left 0.4s ease; }
            .route-sidebar.active { left: 0; }
            .sidebar-header h3 { display: none; }
            .mobile-close-btn { display: block !important; font-size: 40px; background: none; border: none; color: var(--primary); cursor: pointer; margin-left: auto; }
            
            .leaflet-control-zoom { display: none !important; }
            .map-controls { bottom: 20px; left: 0; width: 100%; justify-content: center; padding: 0 10px; }
            .map-controls button { flex: 1; padding: 15px 5px; font-size: 12px; }

            /* ПАНЕЛЬ ПОДРОБНОСТЕЙ */
            .details-panel { 
                width: 100%; 
                height: auto; 
                max-height: 85vh; 
                right: 0; 
                top: auto; 
                bottom: -100%; 
                border-radius: 30px 30px 0 0; 
                z-index: 7000; 
                transition: bottom 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); 
            }
            
            .details-panel.active { bottom: 0; right: 0; }
            .details-header { padding: 15px 20px; }
            .drag-handle { display: block; width: 50px; height: 6px; background: #ddd; border-radius: 10px; margin: 0 auto 15px; }
            .details-close { display: block; top: 15px; right: 20px; }
            .details-content { overflow-y: auto; padding-bottom: 20px; }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="header-content">
        <div class="header-left">
            <div class="logo-medallion-c"><span>С</span></div>
            <div class="title-group">
                <h1 class="main-title">КУЛЬТУРНОЕ НАСЛЕДИЕ</h1>
                <h2 class="sub-title">ГОРОДА СЛУЦКА</h2>
            </div>
        </div>
        <div class="header-search-container">
            <input type="text" id="pcSearch" placeholder="Найти достопримечательность...">
        </div>
    </div>
</header>

<main class="app">
    <button id="toggleSidebar" class="mobile-menu-btn">☰ Список</button>

    <aside class="route-sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3>Достопримечательности</h3>
            <button id="closeSidebar" class="mobile-close-btn">×</button>
        </div>
        
        <div class="sidebar-scroll"><ul id="route-list"></ul></div>
        
        <div class="sidebar-controls">
            <button id="buildRoute" class="btn-main">ПОСТРОИТЬ МАРШРУТ</button>
            <button id="clearRoute" class="btn-main">ОЧИСТИТЬ ВСЁ</button>
        </div>
    </aside>

    <section class="map-wrapper">
        <div id="map"></div>
        <!-- КНОПКИ СКРЫТЫ ИЗНАЧАЛЬНО -->
        <div class="map-controls" id="mapControls">
            <button id="pauseCar">Пауза</button>
            <button id="followCar">Слежение: ВЫКЛ</button>
        </div>
    </section>

    <!-- Панель подробностей -->
    <aside class="details-panel" id="detailsPanel">
        <div class="details-header" id="detailsHeader">
            <div class="drag-handle"></div>
            <button class="details-close" id="closeDetailsBtn">×</button>
            <h2 id="details-title"></h2>
        </div>
        
        <div class="details-content">
            <div class="details-gallery" id="details-gallery"></div>
            <div class="video-main-container" id="video-box" style="display: none;">
                <!-- Специальные теги для iPhone -->
                <video id="details-video" controls playsinline webkit-playsinline preload="metadata"></video>
            </div>
        </div>
    </aside>

    <div id="imageModal" class="image-zoom-modal">
        <span class="close-zoom" id="closeZoomBtn">&times;</span>
        <div class="nav-zone left" onclick="changeImage(-1)"><span>&#10094;</span></div>
        <img id="fullImage">
        <div class="nav-zone right" onclick="changeImage(1)"><span>&#10095;</span></div>
    </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-routing-machine/3.2.12/leaflet-routing-machine.min.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    
    let followCar = false; 
    
    const map = L.map('map', { 
        attributionControl: false, 
        zoomSnap: 0.1
    }).setView([53.0265, 27.5550], 14.5); 

    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        crossOrigin: true
    }).addTo(map);

    const markersGroup = L.markerClusterGroup({ 
        showCoverageOnHover: false, 
        disableClusteringAtZoom: 13, 
        spiderfyOnMaxZoom: true 
    });
    map.addLayer(markersGroup);

    const attractionsData = {
        "type": "FeatureCollection",
        "features": [
            { "type": "Feature", "properties": { "ID": 1, "NAME": "Часовня Святой Варвары", "IMAGES_DIR": "images/varvara_chapel", "IMAGES_COUNT": 4, "VIDEO": "video/varvara_chapel.mp4", "TYPE": "chapel" }, "geometry": { "type": "Point", "coordinates": [27.55419, 53.02608] } },
            { "type": "Feature", "properties": { "ID": 2, "NAME": "Памятник войнам-освободителям", "IMAGES_DIR": "images/monument_soldier", "IMAGES_COUNT": 3, "VIDEO": "video/monument_soldier.mp4", "TYPE": "monument" }, "geometry": { "type": "Point", "coordinates": [27.55397, 53.02730] } },
            { "type": "Feature", "properties": { "ID": 3, "NAME": "Памятник Софии Слуцкой", "IMAGES_DIR": "images/monument_sofia", "IMAGES_COUNT": 5, "VIDEO": "video/monument_sofia.mp4", "TYPE": "monument" }, "geometry": { "type": "Point", "coordinates": [27.55375, 53.02630] } },
            { "type": "Feature", "properties": { "ID": 4, "NAME": "Макет храма чудотворца", "IMAGES_DIR": "images/model_of_temple", "IMAGES_COUNT": 4, "VIDEO": "video/model_of_temple.mp4", "TYPE": "monument" }, "geometry": { "type": "Point", "coordinates": [27.55400, 53.02659] } },
            { "type": "Feature", "properties": { "ID": 5, "NAME": "Дом Культуры", "IMAGES_DIR": "images/house_of_culture", "IMAGES_COUNT": 3, "VIDEO": "video/house_of_culture.mp4", "TYPE": "museum" }, "geometry": { "type": "Point", "coordinates": [27.55563, 53.02807] } },
            { "type": "Feature", "properties": { "ID": 6, "NAME": "Музей слуцкие пояса", "IMAGES_DIR": "images/museum_of_belts", "IMAGES_COUNT": 5, "VIDEO": "video/museum_of_belts.mp4", "TYPE": "museum" }, "geometry": { "type": "Point", "coordinates": [27.55531, 53.02443] } },
            { "type": "Feature", "properties": { "ID": 7, "NAME": "Гимназия №1", "IMAGES_DIR": "images/gymnasium", "IMAGES_COUNT": 4, "VIDEO": "video/gymnasium.mp4", "TYPE": "school" }, "geometry": { "type": "Point", "coordinates": [27.55914, 53.02604] } },
            { "type": "Feature", "properties": { "ID": 8, "NAME": "Памятник Анастасии Слуцкой", "IMAGES_DIR": "images/monument_anastasia", "IMAGES_COUNT": 3, "VIDEO": "video/monument_anastasia.mp4", "TYPE": "monument" }, "geometry": { "type": "Point", "coordinates": [27.55522, 53.02768] } },
            { "type": "Feature", "properties": { "ID": 9, "NAME": "Краеведческий музей", "IMAGES_DIR": "images/local_history_museum", "IMAGES_COUNT": 3, "VIDEO": "video/local_history_museum.mp4", "TYPE": "museum" }, "geometry": { "type": "Point", "coordinates": [27.54690, 53.02375] } },
            { "type": "Feature", "properties": { "ID": 10, "NAME": "Бывшая почтовая станция", "IMAGES_DIR": "images/post_office", "IMAGES_COUNT": 5, "VIDEO": "video/post_office.mp4", "TYPE": "museum" }, "geometry": { "type": "Point", "coordinates": [27.54511, 53.02254] } },
            { "type": "Feature", "properties": { "ID": 11, "NAME": "Духовное училище", "IMAGES_DIR": "images/theological_school", "IMAGES_COUNT": 6, "VIDEO": "video/theological_school.mp4", "TYPE": "museum" }, "geometry": { "type": "Point", "coordinates": [27.54584, 53.01792] } },
            { "type": "Feature", "properties": { "ID": 12, "NAME": "Собор святого Михаила", "IMAGES_DIR": "images/michael_cathedral", "IMAGES_COUNT": 3, "VIDEO": "video/michael_cathedral.mp4", "TYPE": "chapel" }, "geometry": { "type": "Point", "coordinates": [27.57840, 53.03068] } }
        ]
    };

    let carMarker = null, routingControl = null, selectedPoints = [], animationPoints = [], stops = [];
    let currentIndex = 0, segmentProgress = 0, isPaused = false, isWaitingForClose = false, currentProps = null;
    let currentImgIdx = 1;

    function getPinColor(type) {
        switch(type) {
            case 'chapel': return 'pin-chapel'; case 'monument': return 'pin-monument';
            case 'museum': return 'pin-museum'; case 'school': return 'pin-school';
            default: return 'pin-monument';
        }
    }

    L.geoJSON(attractionsData, {
        pointToLayer: (f, latlng) => {
            const colorClass = getPinColor(f.properties.TYPE);
            const iconHTML = `<div class="custom-pin ${colorClass}"><img src="img/icons/${f.properties.TYPE}.png" onerror="this.style.display='none'"></div>`;
            const icon = L.divIcon({ className: 'custom-div-icon', html: iconHTML, iconSize: [38, 38], iconAnchor: [19, 38] });
            const m = L.marker(latlng, { icon: icon });
            m.bindTooltip(f.properties.NAME, { direction: 'top', offset: [0, -35] });
            return m;
        },
        onEachFeature: (f, layer) => {
            const li = document.createElement('li');
            li.innerHTML = `<input type="checkbox" id="c${f.properties.ID}"><label for="c${f.properties.ID}"><span>${f.properties.NAME}</span></label>`;
            li.querySelector('input').addEventListener('change', (e) => {
                if (e.target.checked) selectedPoints.push({ latlng: layer.getLatLng(), properties: f.properties });
                else selectedPoints = selectedPoints.filter(p => p.properties.ID !== f.properties.ID);
            });
            document.getElementById('route-list').appendChild(li);
            layer.on('click', () => window.openDetails(f.properties, layer.getLatLng()));
            markersGroup.addLayer(layer);
        }
    });

    document.getElementById('buildRoute').onclick = () => {
        if (selectedPoints.length < 2) return alert('Выберите хотя бы 2 объекта!');
        if (routingControl) map.removeControl(routingControl);
        document.getElementById('sidebar').classList.remove('active');

        document.getElementById('mapControls').style.display = 'flex';

        routingControl = L.Routing.control({
            waypoints: selectedPoints.map(p => p.latlng),
            router: L.Routing.osrmv1({ serviceUrl: 'https://router.project-osrm.org/route/v1' }),
            createMarker: () => null, addWaypoints: false, show: false,
            lineOptions: { styles: [{ color: '#440118', weight: 6, opacity: 0.7 }] }
        }).addTo(map);

        routingControl.on('routesfound', (e) => {
            animationPoints = e.routes[0].coordinates;
            stops = selectedPoints.map(p => ({ 
                index: findClosestIndex(animationPoints, p.latlng), 
                properties: p.properties,
                latlng: p.latlng
            })).sort((a, b) => a.index - b.index);
            
            currentIndex = 0; segmentProgress = 0; isWaitingForClose = true;
            window.openDetails(stops[0].properties, stops[0].latlng);
            startCarAnimation();
        });
    };

    function startCarAnimation() {
        if (carMarker) map.removeLayer(carMarker);
        carMarker = L.marker([animationPoints[0].lat, animationPoints[0].lng], {
            icon: L.divIcon({ className: 'car-icon-container', html: `<img src="img/car.png" id="car-img" style="width:36px;height:36px;" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3204/3204914.png'">`, iconSize: [36, 36], iconAnchor: [18, 18] })
        }).addTo(map);
        requestAnimationFrame(animateStep);
    }

    function animateStep() {
        if (!animationPoints.length || currentIndex >= animationPoints.length - 1) return;
        if (isPaused || isWaitingForClose) { requestAnimationFrame(animateStep); return; }

        const start = animationPoints[currentIndex], end = animationPoints[currentIndex + 1];
        segmentProgress += 0.05; 

        if (segmentProgress >= 1) {
            segmentProgress = 0; currentIndex++;
            const stop = stops.find(s => s.index === currentIndex);
            if (stop) { 
                isWaitingForClose = true; 
                window.openDetails(stop.properties, stop.latlng); 
            }
        }

        const lat = start.lat + (end.lat - start.lat) * segmentProgress;
        const lng = start.lng + (end.lng - start.lng) * segmentProgress;
        const pos = [lat, lng];
        
        carMarker.setLatLng(pos);
        if (followCar) map.panTo(pos, { animate: true, duration: 0.1 });
        
        requestAnimationFrame(animateStep);
    }

    function findClosestIndex(coords, latlng) {
        let minDist = Infinity, index = 0;
        coords.forEach((c, i) => { const d = Math.hypot(c.lat - latlng.lat, c.lng - latlng.lng); if (d < minDist) { minDist = d; index = i; } });
        return index;
    }

    window.openDetails = function(props, latlng) {
        currentProps = props;
        document.getElementById('details-title').textContent = props.NAME;
        
        const gallery = document.getElementById('details-gallery');
        gallery.innerHTML = '';
        for (let i = 1; i <= (props.IMAGES_COUNT || 0); i++) {
            const img = document.createElement('img');
            img.src = `${props.IMAGES_DIR}/${i}.jpg`;
            img.loading = "lazy";
            img.onclick = () => openImageZoom(i);
            gallery.appendChild(img);
        }

        const videoBox = document.getElementById('video-box');
        const videoEl = document.getElementById('details-video');
        if (props.VIDEO) {
            videoEl.src = props.VIDEO;
            videoEl.load(); 
            videoBox.style.display = 'block';
        } else {
            videoEl.pause();
            videoBox.style.display = 'none';
        }

        document.getElementById('detailsPanel').classList.add('active');

        // ЗОЛОТАЯ СЕРЕДИНА: ПИН ИДЕАЛЬНО В ЦЕНТРЕ
        if (latlng) {
            let targetLat = latlng.lat;
            let targetLng = latlng.lng;
            
            if (window.innerWidth <= 768) {
                targetLat -= 0.0015; // Возвращаем минус, чтобы пин не прятался под окном
            } else {
                targetLng += 0.006; 
            }
            map.flyTo([targetLat, targetLng], 16, { animate: true, duration: 1.5 });
        }
    };

    function closeDetailsPanel() {
        document.getElementById('details-video').pause();
        document.getElementById('detailsPanel').classList.remove('active'); 
        isWaitingForClose = false; 
    }

    function openImageZoom(idx) {
        currentImgIdx = idx;
        document.getElementById('fullImage').src = `${currentProps.IMAGES_DIR}/${currentImgIdx}.jpg`;
        document.getElementById('imageModal').style.display = 'flex';
    }

    window.changeImage = function(step) {
        currentImgIdx += step;
        if (currentImgIdx > currentProps.IMAGES_COUNT) currentImgIdx = 1;
        if (currentImgIdx < 1) currentImgIdx = currentProps.IMAGES_COUNT;
        document.getElementById('fullImage').src = `${currentProps.IMAGES_DIR}/${currentImgIdx}.jpg`;
    };

    document.addEventListener('keydown', (e) => {
        if (document.getElementById('imageModal').style.display === 'flex') {
            if (e.key === 'ArrowLeft') changeImage(-1);
            if (e.key === 'ArrowRight') changeImage(1);
            if (e.key === 'Escape') document.getElementById('imageModal').style.display = 'none';
        }
    });

    let touchStartX = 0;
    const imageModal = document.getElementById('imageModal');
    
    imageModal.addEventListener('touchstart', e => {
        touchStartX = e.changedTouches[0].screenX;
    }, {passive: true});

    imageModal.addEventListener('touchend', e => {
        const touchEndX = e.changedTouches[0].screenX;
        const swipeDistance = touchStartX - touchEndX;
        if (Math.abs(swipeDistance) > 40) {
            if (swipeDistance > 0) changeImage(1);
            else changeImage(-1);
        }
    }, {passive: true});

    document.getElementById('pcSearch').oninput = (e) => {
        const val = e.target.value.toLowerCase();
        document.querySelectorAll('#route-list li').forEach(li => { li.style.display = li.textContent.toLowerCase().includes(val) ? 'flex' : 'none'; });
    };

    const sidebar = document.getElementById('sidebar');
    document.getElementById('toggleSidebar').onclick = () => sidebar.classList.add('active');
    document.getElementById('closeSidebar').onclick = () => sidebar.classList.remove('active');
    document.getElementById('closeDetailsBtn').onclick = closeDetailsPanel;
    document.getElementById('closeZoomBtn').onclick = () => document.getElementById('imageModal').style.display = 'none';
    
    document.getElementById('pauseCar').onclick = (e) => { 
        isPaused = !isPaused; 
        e.target.textContent = isPaused ? 'Пуск' : 'Пауза'; 
    };
    
    document.getElementById('clearRoute').onclick = () => location.reload();
    
    document.getElementById('followCar').onclick = (e) => { 
        followCar = !followCar; 
        e.target.textContent = `Слежение: ${followCar ? 'ВКЛ' : 'ВЫКЛ'}`; 
    };

    let touchStartY = 0;
    const detailsHeader = document.getElementById('detailsHeader');
    
    detailsHeader.addEventListener('touchstart', e => {
        touchStartY = e.changedTouches[0].screenY;
    }, {passive: true});

    detailsHeader.addEventListener('touchend', e => {
        const touchEndY = e.changedTouches[0].screenY;
        if (touchEndY - touchStartY > 50) { 
            closeDetailsPanel();
        }
    }, {passive: true});
});
</script>
</body>
</html>
